<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Automobile Industry Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --white: #ffffff;
  --off: #f8f8f7;
  --border: #e8e8e5;
  --muted: #a0a09a;
  --ink2: #6b6b64;
  --ink: #1a1a18;
  --blue: #1a56db;
  --green: #16a34a;
  --red: #dc2626;
  --amber: #d97706;
  --teal: #0891b2;
  --purple: #7c3aed;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --r: 4px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--white); color: var(--ink); font-size: 13px; }

/* ── TOP NAV ── */
.top-bar { display: flex; align-items: center; gap: 0; border-bottom: 1px solid var(--border); background: var(--white); position: sticky; top: 0; z-index: 100; }
.top-bar-title { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); padding: 0 16px; white-space: nowrap; border-right: 1px solid var(--border); height: 42px; display: flex; align-items: center; }
.main-tabs { display: flex; overflow-x: auto; scrollbar-width: none; }
.main-tabs::-webkit-scrollbar { display: none; }
.main-tab { padding: 0 16px; height: 42px; display: flex; align-items: center; font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: color .12s, border-color .12s; user-select: none; }
.main-tab:hover { color: var(--ink); }
.main-tab.active { color: var(--ink); border-bottom-color: var(--ink); }

/* ── PERIOD BAR ── */
.period-bar { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--off); }
.period-label { font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-right: 4px; }
.period-btn { padding: 3px 10px; border-radius: 12px; border: 1px solid var(--border); font-size: 11px; font-weight: 600; cursor: pointer; background: var(--white); color: var(--ink2); font-family: var(--font); transition: all .1s; }
.period-btn:hover { border-color: var(--ink); color: var(--ink); }
.period-btn.active { background: var(--ink); border-color: var(--ink); color: #fff; }
.sub-tabs { display: flex; gap: 4px; margin-left: auto; }
.sub-tab { padding: 3px 12px; border-radius: 12px; border: 1px solid var(--border); font-size: 11px; font-weight: 600; cursor: pointer; background: var(--white); color: var(--ink2); font-family: var(--font); transition: all .1s; white-space: nowrap; }
.sub-tab:hover { border-color: var(--ink); color: var(--ink); }
.sub-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }

/* ── CONTENT ── */
.content { padding: 16px; }
.section { display: none; }
.section.active { display: block; }

/* ── KPI ROW ── */
.kpi-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
.kpi { flex: 1; min-width: 140px; background: var(--off); border: 1px solid var(--border); border-radius: var(--r); padding: 12px 14px; }
.kpi-label { font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.kpi-val { font-size: 22px; font-weight: 700; letter-spacing: -.03em; color: var(--ink); font-family: var(--mono); line-height: 1; margin-bottom: 4px; }
.kpi-meta { display: flex; gap: 10px; font-size: 10px; font-family: var(--mono); }
.kpi-mom { } .kpi-yoy { }
.pos { color: var(--green); } .neg { color: var(--red); }

/* ── CHART GRID ── */
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.chart-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.chart-grid-1 { display: grid; grid-template-columns: 1fr; gap: 12px; }
@media (max-width: 900px) { .chart-grid, .chart-grid-3 { grid-template-columns: 1fr; } }
.card { background: var(--white); border: 1px solid var(--border); border-radius: var(--r); padding: 14px; }
.card-title { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink2); margin-bottom: 12px; }
.card-sub { font-size: 10px; color: var(--muted); margin-top: 2px; font-family: var(--mono); }
.chart-wrap { position: relative; height: 220px; }
.chart-wrap-lg { position: relative; height: 300px; }
.chart-wrap-sm { position: relative; height: 170px; }

/* ── TABLE ── */
.tbl-wrap { overflow-x: auto; margin-top: 8px; }
table { width: 100%; border-collapse: collapse; white-space: nowrap; }
th { background: var(--off); border-bottom: 1px solid var(--border); padding: 7px 12px; font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--ink2); text-align: right; }
th:first-child { text-align: left; }
td { padding: 8px 12px; text-align: right; font-size: 12px; font-family: var(--mono); border-bottom: 1px solid var(--border); color: var(--ink); }
td:first-child { text-align: left; font-family: var(--font); font-size: 12px; font-weight: 500; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--off); }
.td-pos { color: var(--green); } .td-neg { color: var(--red); }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.section-head { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<!-- TOP NAV -->
<div class="top-bar">
  <div class="top-bar-title">Auto Industry</div>
  <div class="main-tabs">
    <div class="main-tab active" onclick="setTab('overview',this)">Industry Overview</div>
    <div class="main-tab" onclick="setTab('pv',this)">Passenger Vehicles</div>
    <div class="main-tab" onclick="setTab('cv',this)">Commercial Vehicles</div>
    <div class="main-tab" onclick="setTab('2w',this)">Two Wheelers</div>
    <div class="main-tab" onclick="setTab('3w',this)">Three Wheelers</div>
    <div class="main-tab" onclick="setTab('tr',this)">Tractors</div>
    <div class="main-tab" onclick="setTab('ev',this)">EV Dashboard</div>
  </div>
</div>

<!-- PERIOD + SUB-TAB BAR -->
<div class="period-bar">
  <span class="period-label">Period</span>
  <button class="period-btn" onclick="setPeriod(12,this)">1Y</button>
  <button class="period-btn" onclick="setPeriod(24,this)">2Y</button>
  <button class="period-btn active" onclick="setPeriod(36,this)">3Y</button>
  <button class="period-btn" onclick="setPeriod(60,this)">5Y</button>
  <button class="period-btn" onclick="setPeriod(9999,this)">All</button>
  <div class="sub-tabs" id="subTabBar"></div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- ══════════════════════ TAB 1: INDUSTRY OVERVIEW ══════════════════════ -->
  <div class="section active" id="tab-overview">
    <div class="section-head">Industry Overview — Total Sales by Segment</div>
    <div class="chart-grid" id="overview-charts"></div>
  </div>

  <!-- ══════════════════════ TAB 2: PASSENGER VEHICLES ══════════════════════ -->
  <div class="section" id="tab-pv">
    <div id="pv-kpis" class="kpi-row"></div>
    <div id="pv-charts"></div>
  </div>

  <!-- ══════════════════════ TAB 3: COMMERCIAL VEHICLES ══════════════════════ -->
  <div class="section" id="tab-cv">
    <div id="cv-kpis" class="kpi-row"></div>
    <div id="cv-charts"></div>
  </div>

  <!-- ══════════════════════ TAB 4: TWO WHEELERS ══════════════════════ -->
  <div class="section" id="tab-2w">
    <div id="tw-kpis" class="kpi-row"></div>
    <div id="tw-charts"></div>
  </div>

  <!-- ══════════════════════ TAB 5: THREE WHEELERS ══════════════════════ -->
  <div class="section" id="tab-3w">
    <div id="thrw-kpis" class="kpi-row"></div>
    <div id="thrw-charts"></div>
  </div>

  <!-- ══════════════════════ TAB 6: TRACTORS ══════════════════════ -->
  <div class="section" id="tab-tr">
    <div id="tr-kpis" class="kpi-row"></div>
    <div id="tr-charts"></div>
  </div>

  <!-- ══════════════════════ TAB 7: EV DASHBOARD ══════════════════════ -->
  <div class="section" id="tab-ev">
    <div id="ev-kpis" class="kpi-row"></div>
    <div id="ev-charts"></div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════
// DATA — injected by Python
// ══════════════════════════════════════════════════════
const RAW = {};
const DETAIL = {};
const EV_RAW = {};
const TR_RAW = {};

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let selPeriod = 36;
let selTab = 'overview';
let selSub = {};  // sub-tab per main-tab
let charts = {};  // all chart instances keyed by id

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function fmt(v) {
  if (v == null || isNaN(v)) return '—';
  if (v >= 1e7) return (v/1e7).toFixed(1) + 'Cr';
  if (v >= 1e5) return (v/1e5).toFixed(1) + 'L';
  if (v >= 1e3) return (v/1e3).toFixed(1) + 'K';
  return v.toLocaleString('en-IN');
}
function pct(v) {
  if (v == null || isNaN(v) || !isFinite(v)) return '—';
  const s = v >= 0 ? '+' : '';
  return s + v.toFixed(1) + '%';
}
function pctClass(v) { return v >= 0 ? 'pos' : 'neg'; }

function slice(series, n) {
  if (!series || !series.dates) return { dates: [], values: [] };
  const d = series.dates, v = series.values;
  if (n >= 9999) return { dates: [...d], values: [...v] };
  const start = Math.max(0, d.length - n);
  return { dates: d.slice(start), values: v.slice(start) };
}

function latest(series) {
  if (!series || !series.values || !series.values.length) return null;
  return series.values[series.values.length - 1];
}
function mom(series) {
  const v = series && series.values;
  if (!v || v.length < 2) return null;
  const cur = v[v.length - 1], prev = v[v.length - 2];
  if (!prev) return null;
  return (cur - prev) / prev * 100;
}
function yoy(series) {
  const v = series && series.values;
  if (!v || v.length < 13) return null;
  const cur = v[v.length - 1], prev = v[v.length - 13];
  if (!prev) return null;
  return (cur - prev) / prev * 100;
}
function ttm(series) {
  const v = series && series.values;
  if (!v || v.length < 1) return 0;
  return v.slice(-12).reduce((a, b) => a + b, 0);
}
function sum(arr) { return arr.reduce((a, b) => a + b, 0); }

// Month label
function monthLabel(ym) {
  if (!ym) return '';
  const [y, m] = ym.split('-');
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return mo[parseInt(m) - 1] + ' ' + y;
}

// FY grouping (Apr-Mar)
function toFY(series) {
  if (!series || !series.dates) return { years: [], values: [] };
  const map = {};
  series.dates.forEach((ym, i) => {
    const [y, m] = ym.split('-').map(Number);
    const fyStart = m >= 4 ? y : y - 1;
    const label = `FY${String(fyStart).slice(2)}-${String(fyStart + 1).slice(2)}`;
    map[label] = (map[label] || 0) + series.values[i];
  });
  const sorted = Object.entries(map).sort((a, b) => a[0] < b[0] ? -1 : 1);
  return { years: sorted.map(x => x[0]), values: sorted.map(x => x[1]) };
}

// YoY series
function toYoY(series) {
  const d = series.dates, v = series.values;
  const out = { dates: [], values: [] };
  for (let i = 12; i < d.length; i++) {
    if (v[i - 12]) out.dates.push(d[i]), out.values.push((v[i] - v[i-12]) / v[i-12] * 100);
  }
  return out;
}

// ══════════════════════════════════════════════════════
// CHART FACTORY
// ══════════════════════════════════════════════════════
const PLOT = {
  responsive: true, maintainAspectRatio: false,
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: '#1e293b', borderColor: '#334155', borderWidth: 1,
      titleColor: '#f1f5f9', bodyColor: '#cbd5e1',
      callbacks: { label: c => '  ' + fmt(c.parsed.y) }
    }
  },
  scales: {
    x: { ticks: { color: '#a0a09a', font: { size: 9, family: 'DM Mono' }, maxTicksLimit: 8 }, grid: { display: false } },
    y: { ticks: { color: '#a0a09a', font: { size: 9, family: 'DM Mono' }, callback: v => fmt(v) }, grid: { color: '#f0f0ed' } }
  }
};
const PLOT_PCT = JSON.parse(JSON.stringify(PLOT));
PLOT_PCT.scales.y.ticks.callback = v => v.toFixed(1) + '%';
PLOT_PCT.plugins.tooltip.callbacks.label = c => '  ' + c.parsed.y.toFixed(1) + '%';

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function makeLineChart(id, labels, datasets, opts = {}) {
  destroyChart(id);
  const ctx = document.getElementById(id);
  if (!ctx) return;
  const options = JSON.parse(JSON.stringify(opts.pct ? PLOT_PCT : PLOT));
  if (opts.legend) options.plugins.legend = { display: true, position: 'bottom', labels: { color: '#4a5568', font: { size: 10 }, boxWidth: 10, padding: 8 } };
  if (opts.fill) datasets.forEach(d => { d.fill = true; d.backgroundColor = d.borderColor + '18'; });
  charts[id] = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options
  });
}

function makeBarChart(id, labels, datasets, opts = {}) {
  destroyChart(id);
  const ctx = document.getElementById(id);
  if (!ctx) return;
  const options = JSON.parse(JSON.stringify(opts.pct ? PLOT_PCT : PLOT));
  if (opts.legend) options.plugins.legend = { display: true, position: 'bottom', labels: { color: '#4a5568', font: { size: 10 }, boxWidth: 10, padding: 8 } };
  if (opts.stacked) { options.scales.x.stacked = true; options.scales.y.stacked = true; }
  charts[id] = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options
  });
}

function makeComboChart(id, labels, barSeries, lineSeries, color) {
  destroyChart(id);
  const ctx = document.getElementById(id);
  if (!ctx) return;
  const options = JSON.parse(JSON.stringify(PLOT));
  options.plugins.legend = { display: false };
  charts[id] = new Chart(ctx, {
    data: {
      labels,
      datasets: [
        { type: 'bar', data: barSeries, backgroundColor: color + '30', borderColor: color, borderWidth: 1.2, borderRadius: 2, label: 'Volume' },
        { type: 'line', data: lineSeries, borderColor: color, borderWidth: 2, pointRadius: 0, tension: 0.3, yAxisID: 'y', label: 'Trend' }
      ]
    },
    options
  });
}

// Color palette
const COLORS = ['#1a56db','#16a34a','#dc2626','#d97706','#0891b2','#7c3aed','#db2777','#65a30d','#ea580c','#0284c7'];
function getColor(i) { return COLORS[i % COLORS.length]; }

// ══════════════════════════════════════════════════════
// PERIOD / TAB CONTROLS
// ══════════════════════════════════════════════════════
function setPeriod(n, btn) {
  selPeriod = n;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTab(selTab);
}

function setTab(tab, el) {
  selTab = tab;
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  renderSubTabs(tab);
  renderTab(tab);
}

// Sub-tab configs per main tab
const SUB_TABS = {
  overview: [],
  pv: ['Domestic', 'Export', 'EV', 'ICE', 'OEM Comparison'],
  cv: ['HCV', 'LCV', 'Bus', 'Domestic', 'Export', 'OEM Comparison'],
  '2w': ['Motorcycles', 'Scooters', 'EV', 'Domestic', 'Export', 'OEM Comparison'],
  '3w': ['ICE', 'EV', 'Domestic', 'Export', 'OEM Comparison'],
  tr: ['Domestic', 'Export', 'OEM Comparison'],
  ev: ['Volume Trend', 'EV Penetration', 'YoY Growth', 'Market Share'],
};

function renderSubTabs(tab) {
  const bar = document.getElementById('subTabBar');
  bar.innerHTML = '';
  const subs = SUB_TABS[tab] || [];
  if (!selSub[tab]) selSub[tab] = subs[0] || null;
  subs.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'sub-tab' + (selSub[tab] === s ? ' active' : '');
    btn.textContent = s;
    btn.onclick = () => { selSub[tab] = s; renderSubTabs(tab); renderTab(tab); };
    bar.appendChild(btn);
  });
}

// ══════════════════════════════════════════════════════
// KPI CARD BUILDER
// ══════════════════════════════════════════════════════
function buildKPIs(container, items) {
  // items: [{label, series, color}]
  container.innerHTML = '';
  items.forEach(({ label, series, color }) => {
    const lv = latest(series);
    const m = mom(series);
    const y = yoy(series);
    const div = document.createElement('div');
    div.className = 'kpi';
    div.innerHTML = `
      <div class="kpi-label">${label}</div>
      <div class="kpi-val" style="color:${color || 'var(--ink)'}">${lv != null ? fmt(lv) : '—'}</div>
      <div class="kpi-meta">
        <span class="kpi-mom ${m != null ? pctClass(m) : ''}">MoM ${m != null ? pct(m) : '—'}</span>
        <span class="kpi-yoy ${y != null ? pctClass(y) : ''}">YoY ${y != null ? pct(y) : '—'}</span>
      </div>`;
    container.appendChild(div);
  });
}

// ══════════════════════════════════════════════════════
// CHART CARD BUILDER
// ══════════════════════════════════════════════════════
function card(id, title, sub, sizeClass) {
  return `<div class="card"><div class="card-title">${title}${sub ? `<span class="card-sub"> · ${sub}</span>` : ''}</div><div class="${sizeClass || 'chart-wrap'}"><canvas id="${id}"></canvas></div></div>`;
}

// Single series combo chart
function renderSingle(id, series, color, mode) {
  const s = slice(series, selPeriod);
  if (!s.dates.length) return;
  if (mode === 'fy') {
    const fy = toFY(series);
    makeBarChart(id, fy.years, [{ data: fy.values, backgroundColor: color + '50', borderColor: color, borderWidth: 1.5, borderRadius: 3 }]);
  } else if (mode === 'yoy') {
    const y = toYoY(slice(series, selPeriod + 12));
    makeBarChart(id, y.dates, [{ data: y.values, backgroundColor: y.values.map(v => v >= 0 ? '#16a34a50' : '#dc262650'), borderColor: y.values.map(v => v >= 0 ? '#16a34a' : '#dc2626'), borderWidth: 1.5 }], { pct: true });
  } else {
    makeComboChart(id, s.dates, s.values, s.values, color);
  }
}

// Multi-line comparison
function renderMulti(id, seriesMap, mode) {
  const labels = [];
  const entries = Object.entries(seriesMap).filter(([, s]) => s && s.dates && s.dates.length);
  if (!entries.length) return;
  // union labels
  const allDates = new Set();
  entries.forEach(([, s]) => { const sl = slice(s, selPeriod); sl.dates.forEach(d => allDates.add(d)); });
  const sortedDates = [...allDates].sort();
  const datasets = entries.map(([name, series], i) => {
    const sl = slice(series, selPeriod);
    const map = {};
    sl.dates.forEach((d, j) => map[d] = sl.values[j]);
    return {
      label: name,
      data: sortedDates.map(d => map[d] || null),
      borderColor: COLORS[i % COLORS.length],
      borderWidth: 1.8,
      pointRadius: 0,
      tension: 0.3,
      spanGaps: true
    };
  });
  if (mode === 'fy') {
    const fyMap = {};
    entries.forEach(([name, series], i) => {
      const fy = toFY(series);
      fyMap[name] = { years: fy.years, values: fy.values };
    });
    const allYears = [...new Set(entries.flatMap(([n]) => fyMap[n].years))].sort();
    const dsets = entries.map(([name], i) => {
      const m = {};
      fyMap[name].years.forEach((y, j) => m[y] = fyMap[name].values[j]);
      return { label: name, data: allYears.map(y => m[y] || 0), backgroundColor: COLORS[i % COLORS.length] + '80', borderColor: COLORS[i % COLORS.length], borderWidth: 1.5, borderRadius: 2 };
    });
    makeBarChart(id, allYears, dsets, { legend: true, stacked: false });
    return;
  }
  destroyChart(id);
  const ctx = document.getElementById(id);
  if (!ctx) return;
  const opts = JSON.parse(JSON.stringify(PLOT));
  opts.plugins.legend = { display: true, position: 'bottom', labels: { color: '#4a5568', font: { size: 10 }, boxWidth: 10, padding: 8 } };
  charts[id] = new Chart(ctx, { type: 'line', data: { labels: sortedDates, datasets }, options: opts });
}

// ══════════════════════════════════════════════════════
// TAB RENDERERS
// ══════════════════════════════════════════════════════

// ── TAB 1: OVERVIEW ──
function renderOverview() {
  const container = document.getElementById('overview-charts');
  container.innerHTML = '';

  const groups = [
    {
      title: 'Total Passenger Vehicle Sales', sub: 'Tata PV · Mahindra · Maruti · Hyundai · Force · SML',
      series: {
        'Tata PV': DETAIL['Tata Motors PV'] && DETAIL['Tata Motors PV']['Total'],
        'Mahindra': DETAIL['Mahindra'] && DETAIL['Mahindra']['Total PV'],
        'Maruti': DETAIL['Maruti'] && DETAIL['Maruti']['PV'],
        'Hyundai': DETAIL['Hyundai'] && DETAIL['Hyundai']['Total'],
        'Force': DETAIL['Force Motors'] && DETAIL['Force Motors']['Total'],
        'SML': DETAIL['SML Mahindra'] && DETAIL['SML Mahindra']['Total'],
      }, id: 'ov_pv', color: COLORS[0]
    },
    {
      title: 'Total Commercial Vehicle Sales', sub: 'Tata CV · Ashok Leyland · Eicher CV · Mahindra CV',
      series: {

  const kpiItems = Object.entries(kpiSrcMap[sub] || {}).filter(([,s]) => s && s.dates && s.dates.length).map(([label, series], i) => ({ label, series, color: [COLORS[3], COLORS[2], COLORS[0]][i] }));
  buildKPIs(kpiEl, kpiItems);

  if (sub === 'Domestic') {
    chartsEl.innerHTML = card('tr_dom', 'M&M Tractor — Domestic Sales', null, 'chart-wrap-lg');
    if (dom) renderSingle('tr_dom', dom, COLORS[3]);
  } else if (sub === 'Export') {
    chartsEl.innerHTML = card('tr_exp', 'M&M Tractor — Export Sales', null, 'chart-wrap-lg');
    if (exp) renderSingle('tr_exp', exp, COLORS[2]);
  } else if (sub === 'OEM Comparison') {
    chartsEl.innerHTML = card('tr_cmp', 'M&M Tractor — Domestic vs Export vs Total', null, 'chart-wrap-lg') + card('tr_fy', 'M&M Tractor — FY Annual', null, 'chart-wrap-lg');
    const map = { 'Domestic': dom, 'Export': exp, 'Total': tot };
    renderMulti('tr_cmp', map);
    renderMulti('tr_fy', map, 'fy');
  }
}

// ── TAB 7: EV DASHBOARD ──
function renderEV() {
  const sub = selSub['ev'] || 'Volume Trend';
  const kpiEl = document.getElementById('ev-kpis');
  const chartsEl = document.getElementById('ev-charts');
  chartsEl.innerHTML = '';

  const evMap = {
    'Tata EV': EV_RAW['Tata EV'],
    'OLA Electric': EV_RAW['OLA Electric'],
    'TVS EV': EV_RAW['TVS EV'],
    'Atul EV': EV_RAW['Atul EV'],
    'M&M 3W EV': EV_RAW['Mahindra 3W EV'],
  };
  const kpiItems = Object.entries(evMap).filter(([,s]) => s && s.dates && s.dates.length).map(([label, series], i) => ({ label, series, color: COLORS[i] }));
  buildKPIs(kpiEl, kpiItems);

  if (sub === 'Volume Trend') {
    chartsEl.innerHTML = card('ev_vol', 'EV Volume Trend — All Players', null, 'chart-wrap-lg');
    renderMulti('ev_vol', evMap);
  } else if (sub === 'EV Penetration') {
    // Tata EV penetration: EV / (EV + ICE)
    chartsEl.innerHTML = card('ev_pen_tata', 'Tata PV — EV Penetration %', 'EV as % of total Tata PV', 'chart-wrap-lg');
    const evS = DETAIL['Tata Motors PV'] && DETAIL['Tata Motors PV']['EV Sales'];
    const iceS = DETAIL['Tata Motors PV'] && DETAIL['Tata Motors PV']['ICE Sales'];
    if (evS && iceS) {
      const evMap2 = {};
      evS.dates.forEach((d, i) => evMap2[d] = evS.values[i]);
      const iceMap = {};
      iceS.dates.forEach((d, i) => iceMap[d] = iceS.values[i]);
      const dates = [...new Set([...evS.dates, ...iceS.dates])].sort().slice(-selPeriod);
      const penVals = dates.map(d => {
        const e = evMap2[d] || 0, ic = iceMap[d] || 0;
        return ic + e > 0 ? parseFloat(((e / (e + ic)) * 100).toFixed(2)) : null;
      });
      destroyChart('ev_pen_tata');
      const ctx = document.getElementById('ev_pen_tata');
      if (ctx) {
        const opts = JSON.parse(JSON.stringify(PLOT_PCT));
        opts.plugins.legend = { display: false };
        charts['ev_pen_tata'] = new Chart(ctx, { type: 'line', data: { labels: dates, datasets: [{ data: penVals, borderColor: '#1a56db', backgroundColor: '#1a56db18', borderWidth: 2, pointRadius: 0, tension: 0.3, fill: true }] }, options: opts });
      }
    }
  } else if (sub === 'YoY Growth') {
    chartsEl.innerHTML = card('ev_yoy', 'EV Sales — YoY Growth %', 'Monthly YoY comparison across players', 'chart-wrap-lg');
    const entries = Object.entries(evMap).filter(([,s]) => s && s.dates && s.dates.length && s.dates.length >= 13);
    if (entries.length) {
      const allDates = new Set();
      const yoyMaps = {};
      entries.forEach(([name, s]) => {
        const y = toYoY(s);
        yoyMaps[name] = { dates: y.dates, values: y.values };
        y.dates.slice(-selPeriod).forEach(d => allDates.add(d));
      });
      const sortedDates = [...allDates].sort().slice(-selPeriod);
      const datasets = entries.map(([name], i) => {
        const m = {}; yoyMaps[name].dates.forEach((d, j) => m[d] = yoyMaps[name].values[j]);
        return { label: name, data: sortedDates.map(d => m[d] || null), borderColor: COLORS[i], borderWidth: 1.8, pointRadius: 0, tension: 0.3, spanGaps: true };
      });
      destroyChart('ev_yoy');
      const ctx = document.getElementById('ev_yoy');
      if (ctx) {
        const opts = JSON.parse(JSON.stringify(PLOT_PCT));
        opts.plugins.legend = { display: true, position: 'bottom', labels: { color: '#4a5568', font: { size: 10 }, boxWidth: 10, padding: 8 } };
        charts['ev_yoy'] = new Chart(ctx, { type: 'line', data: { labels: sortedDates, datasets }, options: opts });
      }
    }
  } else if (sub === 'Market Share') {
    chartsEl.innerHTML = card('ev_share', 'EV Market Share % — Monthly', null, 'chart-wrap-lg');
    const entries = Object.entries(evMap).filter(([,s]) => s && s.dates && s.dates.length);
    const allDates = new Set();
    entries.forEach(([, s]) => { const sl = slice(s, selPeriod); sl.dates.forEach(d => allDates.add(d)); });
    const sortedDates = [...allDates].sort();
    const valMaps = {};
    entries.forEach(([name, s]) => { const sl = slice(s, selPeriod); sl.dates.forEach((d, i) => { if (!valMaps[d]) valMaps[d] = {}; valMaps[d][name] = sl.values[i]; }); });
    const datasets = entries.map(([name], i) => ({
      label: name,
      data: sortedDates.map(d => {
        const total = entries.reduce((a, [n]) => a + (valMaps[d] && valMaps[d][n] || 0), 0);
        if (!total) return null;
        return parseFloat(((valMaps[d] && valMaps[d][name] || 0) / total * 100).toFixed(2));
      }),
      borderColor: COLORS[i], backgroundColor: COLORS[i] + '50', borderWidth: 1.5, pointRadius: 0, tension: 0.3, fill: true
    }));
    destroyChart('ev_share');
    const ctx = document.getElementById('ev_share');
    if (ctx) {
      const opts = JSON.parse(JSON.stringify(PLOT_PCT));
      opts.plugins.legend = { display: true, position: 'bottom', labels: { color: '#4a5568', font: { size: 10 }, boxWidth: 10, padding: 8 } };
      opts.scales.x.stacked = true; opts.scales.y.stacked = true;
      charts['ev_share'] = new Chart(ctx, { type: 'line', data: { labels: sortedDates, datasets }, options: opts });
    }
  }
}

// ══════════════════════════════════════════════════════
// DISPATCH
// ══════════════════════════════════════════════════════
function renderTab(tab) {
  if (tab === 'overview') renderOverview();
  else if (tab === 'pv') renderPV();
  else if (tab === 'cv') renderCV();
  else if (tab === '2w') renderTW();
  else if (tab === '3w') renderTHRW();
  else if (tab === 'tr') renderTR();
  else if (tab === 'ev') renderEV();
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
renderSubTabs('overview');
renderTab('overview');
</script>
